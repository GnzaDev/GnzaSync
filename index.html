<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>translatetauri</title>
  </head>
  <body>
    <script>
      window.addEventListener('error', function(e) {
        const err = document.createElement('div');
        err.style.cssText = 'color:red; background:black; padding:20px; z-index:9999; position:absolute; top:0; left:0; width:100%;';
        err.innerText = 'Global Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno;
        document.body.appendChild(err);
      });
      window.addEventListener('unhandledrejection', function(e) {
        const err = document.createElement('div');
        err.style.cssText = 'color:red; background:black; padding:20px; z-index:9999; position:absolute; top:0; left:0; width:100%;';
        err.innerText = 'Promise Error: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason);
        document.body.appendChild(err);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
